  <line x1="108" y1="387" x2="210" y2="390" stroke="#3d2b1a" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

  <!-- Snorharen rechts -->
  <line x1="404" y1="366" x2="302" y2="374" stroke="#3d2b1a" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <line x1="404" y1="387" x2="302" y2="390" stroke="#3d2b1a" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

