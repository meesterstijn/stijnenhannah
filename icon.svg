<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Achtergrond warm beige -->
  <rect width="512" height="512" rx="90" fill="#c8926a"/>

  <!-- Huis/kat lichaam (muren) -->
